    <style>
        :root {
            --primary: #6366f1;
            --success: #22c55e;
            --bg: #f1f5f9;
            --dark: #1a1a1a;
            --accent: #ffc107;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            overflow: hidden;
            touch-action: manipulation;
        }
        
        #outer{
            width: 100%; max-width: 450px; background: #e1f5fe; height: 100%; position: relative; overflow: hidden; display: flex; flex-direction: column;
        }

        .container {
            
            background: white;
            padding: 20px;
            text-align: center;
        }

        .menu-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:active { transform: scale(0.95); }

        .game-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 100px;
            margin-top: 10px;
        }

        .column { display: flex; flex-direction: column; gap: 15px; }

        .slot-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f8fafc;
            padding: 10px;
            border-radius: 15px;
            border: 2px dashed #cbd5e1;
        }

        .slot {
            width: 55px;
            height: 55px;
            background: #e2e8f0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            filter: grayscale(1) brightness(0.4);
            opacity: 0.3;
        }

        .slot.matched {
            filter: none;
            opacity: 1;
            background: #dcfce7;
            border-color: var(--success);
            transform: scale(1.05);
            transition: 0.3s;
        }

        .draggable-item {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: grab;
            touch-action: none;
            z-index: 10;
        }

        .item-name { font-size: 14px; font-weight: 600; color: #475569; }
        .hidden { visibility: hidden; pointer-events: none; }
        
        #msg { color: #64748b; margin-bottom: 20px; min-height: 1.2em; }
        
        /* --- NAVIGATION & SIDEBAR --- */
        .navbar {
            
            color: white;
            display: flex;
            align-items: center;
            background: var(--dark);
            margin-bottom: 20px;
            
        }

        .menu-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            margin: 0 10px 0 0;
        }

        header h1 {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 1px;
            margin:0;
        }

        .sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            background-color: var(--dark);
            overflow-x: hidden;
            transition: 0.3s;
            padding-top: 10px;
        }

        .sidebar a {
            padding: 15px 30px;
            text-decoration: none;
            font-size: 1.1rem;
            color: #ccc;
            display: block;
            transition: 0.2s;
            border-bottom: 1px solid #333;
        }

        .sidebar a:hover {
            color: var(--accent);
            background-color: #222;
        }

        .sidebar .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 36px;
            color: white;
            cursor: pointer;
        }

        .overlaynav {
            display: none;
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1500;
        }
        footer {
            text-align: center;
            padding: 10px 10px;
            font-size: 0.9rem;
            
            background: var(--dark);
            color: white;
            margin-top: 20px;
        }
        
        .visually-hidden {
            position: absolute !important;
            width: 1px !important;
            height: 1px !important;
            padding: 0 !important;
            margin: -1px !important;
            overflow: hidden !important;
            clip: rect(0, 0, 0, 0) !important;
            white-space: nowrap !important;
            border: 0 !important;
        }
        
    </style>
</head>
<body>
    <div id="outer">
<!-- Sidebar Menu -->
    <div id="mySidebar" class="sidebar">
        <span class="close-btn" onclick="closeNav()">&times;</span>
        <a href="https://nteste05.github.io/gemii/" onclick="closeNav()">👽 Game Lainnya</a>
    </div>
    <!-- Overlay Background -->
    <div id="overlaynav" class="overlaynav" onclick="closeNav()"></div>
    <nav class="navbar">
        <button class="menu-btn" onclick="openNav()">&#9776;</button>
        <header><h1>🧩 PasangGambar</h1></header>
        <p class="visually-hidden"></p>
    </nav>
<div class="container">
    <p id="msg">Pilih kategori untuk mulai!</p>

    <div class="menu-container" id="menu">
        <button onclick="startGame('makanan')">🍔 Makanan</button>
        <button onclick="startGame('transportasi')">🚀 Transpo</button>
        <button onclick="startGame('hewan')">🦁 Hewan</button>
    </div>

    <div class="game-area" id="game-area" style="display: none;">
        <div class="column" id="left-col"></div>
        <div class="column" id="right-col"></div>
    </div>
</div>
<footer>
    <p>&copy; 2026 <a style="color: inherit; text-decoration: none;" href="https://nteste05.github.io/pasanggambar">PasangGambar: Game Edukasi Mencocokkan Siluet & Gambar.</a> <br> 
    <small>Konten ini hanya untuk tujuan hiburan.</small>
    </p>
</footer>
</div>
<script>
    const database = {
        makanan: [
            { id: 'f1', icon: '🍎', name: 'Apel' }, { id: 'f2', icon: '🍔', name: 'Burger' },
            { id: 'f3', icon: '🍕', name: 'Pizza' }, { id: 'f4', icon: '🥦', name: 'Brokoli' },
            { id: 'f5', icon: '🍣', name: 'Sushi' }
        ],
        transportasi: [
            { id: 't1', icon: '🚗', name: 'Mobil' }, { id: 't2', icon: '🚀', name: 'Roket' },
            { id: 't3', icon: '✈️', name: 'Pesawat' }, { id: 't4', icon: '🚲', name: 'Sepeda' },
            { id: 't5', icon: '🚢', name: 'Kapal' }
        ],
        hewan: [
            { id: 'a1', icon: '🦁', name: 'Singa' }, { id: 'a2', icon: '🐘', name: 'Gajah' },
            { id: 'a3', icon: '🦒', name: 'Jerapah' }, { id: 'a4', icon: '🐧', name: 'Penguin' },
            { id: 'a5', icon: '🐸', name: 'Katak' }
        ]
    };

    let score = 0;

    function startGame(category) {
        score = 0;
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game-area').style.display = 'grid';
        document.getElementById('msg').innerText = "Tarik gambar ke bayangannya!";
        
        const leftCol = document.getElementById('left-col');
        const rightCol = document.getElementById('right-col');
        leftCol.innerHTML = '';
        rightCol.innerHTML = '';

        const items = [...database[category]];
        
        // Render Target (Acak)
        [...items].sort(() => Math.random() - 0.5).forEach(item => {
            const wrap = document.createElement('div');
            wrap.className = 'slot-wrapper';
            wrap.innerHTML = `<div class="slot" data-id="${item.id}">${item.icon}</div><span class="item-name">${item.name}</span>`;
            leftCol.appendChild(wrap);
        });

        // Render Draggable
        items.forEach(item => {
            const el = document.createElement('div');
            el.className = 'draggable-item';
            el.innerText = item.icon;
            el.dataset.id = item.id;
            initDragLogic(el);
            rightCol.appendChild(el);
        });
    }

    function initDragLogic(el) {
        let offX, offY;

        // Touch Start
        el.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            const rect = el.getBoundingClientRect();
            offX = touch.clientX - rect.left;
            offY = touch.clientY - rect.top;
            el.style.position = 'fixed';
            el.style.width = rect.width + 'px';
            moveAt(touch.clientX, touch.clientY);
        }, { passive: false });

        // Touch Move
        el.addEventListener('touchmove', (e) => {
            e.preventDefault();
            moveAt(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });

        // Touch End
        el.addEventListener('touchend', (e) => {
            const touch = e.changedTouches[0];
            el.style.display = 'none';
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            el.style.display = 'flex';
            el.style.position = 'static';

            if (target && target.classList.contains('slot')) {
                checkMatch(el.dataset.id, target, el);
            }
        });

        function moveAt(x, y) {
            el.style.left = (x - offX) + 'px';
            el.style.top = (y - offY) + 'px';
        }
    }

    function checkMatch(id, slot, origin) {
        if (slot.dataset.id === id && !slot.classList.contains('matched')) {
            slot.classList.add('matched');
            origin.classList.add('hidden');
            score++;
            
            if (score === 5) {
                document.getElementById('msg').innerHTML = "🎉 <b>Luar Biasa! Kamu Menang!</b>";
                // Tunggu 2 detik lalu reload game (kembali ke menu)
                setTimeout(() => {
                    location.reload();
                }, 2000);
            }
        }
    }
    
    const sidebar = document.getElementById("mySidebar");
    const overlaynav = document.getElementById("overlaynav");
        
        function openNav() {
            sidebar.style.width = "280px";
            overlaynav.style.display = "block";
            // Mencegah scroll pada body saat menu buka
            document.body.style.overflow = "hidden";
        }
        
        function closeNav() {
            sidebar.style.width = "0";
            overlaynav.style.display = "none";
            // Mengembalikan scroll body
            document.body.style.overflow = "auto";
        }
    
</script>

</body>
